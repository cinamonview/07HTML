

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H11Frame.html</title>
</head>

<!-- 
프레임은 하나의 페이지를 여러 개의 구역으로 나눠서 서로 다른 
페이지를 배치한다.

    형식]
        <frameset rows="행 분할" cols="열 분할">
            <frame src="경로 1" name="프레임이름1">
            <frameset src="경로 2" name="프레임이름2">
        </frameset>    
-->


<!-- 
    rows로 3분할 후 프레임의 높이는 px 혹은 *로 지정한다.
    즉 전체를 3행으로 분할한 후 높이를 각각 지정한다.
 -->
<frameset rows="100px, *, 50px" border="5" frameborder="1">
    <!-- 1구역 : Top영역 
         noresize로 지정되어 있으므로 프레임의 크기를 조절할 수 없다. -->
    <frame src="./frame/topFrame.html" name="topFrame" scrolling="no" marginwidth="0" marginheight="0" noresize>
        <!-- 2구역 : cols로 다시 2열로 분할한다. -->
        <frameset cols="300px,*" border="5" frameborder="1">
            <!-- 2-1구역 : left 메뉴 영역 -->
            <frame src="./frame/leftFrame.html" name="leftFrame" >
            <!-- 2-2 구역 : contents 영역 -->
            <frame src="./frame/contentFrame.html" name="contentFrame">
        </frameset>
        <!-- 3구역 : bottom 영역 -->
    <frame src="./frame/bottomFrame.html" name="bottomFrame" scrolling="no" marginwidth="0" marginheight="0">
</frameset>
<noframes>이 브라우져는 프레임을 지원하지 않습니다.</noframes>
<body>
    프레임은 body에 들어가면 안된다!!
</body>
</html>
