<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5+CSS3+JavaScript</title>
    <style>
        /*
        body, h2와 같은 태그 자체를 (Seloctor)해서
        스타일을 지정한다.
        border = 테두리
        h2 : 헤드라인
        hr : A horizontal rule : 웹페이지에 가로로 선을 긋는 태그
        */
        body{
            background-color: linen; color: blue;
        }
        h2{
            text-align: center; color: darkred;
        }
        hr{
            height: 5px; border: solid gray; background-color: gray; 
        }
        span{
            color: red; font-size: 25px;
        }
    </style>
    <!-- 
    Script:
        문서에 JAvaScript를 선언할때 사용한다. 
        텍스트나 이미지와 같은 정적요소에 동적인 효과를 부여한다.-->
    <script>
        //JavaScript함수 선언
        function show(){
            //id가 singer인 요소를 선택한후 src속성에 이미지를 지정한다.
            document.getElementById('singer').src = './images/ElvisPresley.png';
        }
        function hide(){
            //scr 속성에 빈 문자열을 대입하여서 이미지를 제거한다.
            document.getElementById('singer').src = '';
        }
    </script>
</head>


<body>
    <!--
    h2 태그는 헤드라인 테그이다.
    onmouseover는 텍스트에 마우스를 올리면 show() 함수를 호출하고
    onmouseout은 마우스를 내리면 hide()를 호출해서
    이미지를 보임/ 숨김 상태로 토글한다.
    다양한 이벤트 핸들러 들이 이다.-->
    <h2 onmouseover="show();" onmouseout="hide();">엘비스 프레슬리</h2>
    <hr>
    <div>
        <!--
        이미지를 문서에 삽입할때 사용하는 태그.
        첫 실행(새로고침에서 첫실행 되는것에도 해당된다.)
        에서는 바나나 이미지가 출력된다.-->
        <img src="./images/banana.png" id="singer"> 
    </div>
    <!--
    Style 태그 내부에 span 태그선택자를 통해
    폰트의 색깔과 크기를 지정했으므로 좀 더 크게 표시된다.
    -->
    그는 미국의 가수이자 배우였습니다.
    영화 <span>러브미텐더</span>로 데뷔했습니다.
    그는 <span>"로큰롤의 왕"</span>으로 불립니다.
</body>
</html>
