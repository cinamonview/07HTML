<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H01Text02.html - 텍스트 효과</title>
</head>
<body>

    <h2> 텍스트 꾸미기 </h2>
    <!-- 
    u : underline의 약자로 밑줄을 표현한다.
    mark : 형광펜으로 강조하듯이 표현한다. -->
    <h3> 텍스트 밑줄긋기</h3>
    <u> u태그는 텍스트에 <mark>밑줄</mark>을 표현합니다</u>

    <h3> 이탤릭체로 표시하기</h3>
    <i> i 태그는 텍스트를 <mark>이탤릭체</mark>로 표현합니다.</i>

    <!-- 
    strong : 
        저시력자를 위한 스크린 리더( 저시력자를 위한 텍스트를 읽어주는 소프트웨어 )
        가 텍스트를 읽을 떄 조금 더 강조해서 읽어준다. 
    b : 
        bold의 약자로 텍스트를 진하게 표현한다.
    q :
        텍스트 양쪽에 더블쿼테이션(쌍따옴표)을 붙여준다.
    -->
    <h3>텍스트 진하기 1,2</h3>
    <b> b 태그로 텍스트 진하게 표현</b><br>
    <strong> strong태그로  <q>텍스트</q> 진하게 표현합니다.</strong>

    <!-- 
    윗첨자는 숫자의 주수승을 표현하고,
    아래첨자는 수학의 log를 표현할때 사용됩니다.
    -->
    <h3> 윗 첨자 </h3>
    내 이름은 <sup>홍길동</sup> 입니다.

    <h3> 아래 첨자 </h3>
    네놈의 이름은 <sub>홍길순</sub> 입니다.

    <!-- 
    텍스트에 취소선을 표현하고 싶을때 사용하는 태그입니다.
    텍스트 중간에 라인을 표시한다.
    abbr : title 속성을 사용하면 마우스 오버시 풍선 도움말을 볼 수 있다. -->
    <h3> 텍스트 중간에 줄긋기 1,2</h3>
    <abbr title="정상가">판매가 1</abbr> : <strike>10,000원</strike> => 5,000원<br>
    <abbr title="할인가">판매가 2</abbr> : <del>20,000원</del> => 10,000원

    <h3> 이탤릭체 + 볼드 테스트 </h3>
    <i><b>이탤릭 + 볼드</b></i>
</body>
</html>
