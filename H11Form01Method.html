

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 
    form 태그 : 
        클라이언트가 입력한 값을 서버로 전송할때 
        사용되는 태그로 하위태그로는 input, select, textarea, button이 있다
            -주요속성
                name : 폼의 이름을 설정한다. 한페이지에 2개 이상 존재할경우
                    구분하는 용도로 사용된다. JavaScript에서 접근하기
                    위한 용도로도 사용된다.
                action : 클라이언트가 입력한 값을 전송할 서버의 
                    경로를 지정.
                    http를 사용하는 절대 경로나 로컬경로를 지정할 수 있다.
                method : 전송방식을 설정해준다. GET/POST
                target : a태그와 동일하게 폼값을 전송할 프레임의
                위치를 설정해준다.
     -->
    <h2>form 태그로 데이터 전송하기</h2>

    <h3>GET방식</h3>

    <form action="http://itempage3.auction.co.kr/DetailView.aspx" method="get">
        상품일련번호:<input type="text" name="itemno" value="E898974420" />
        <br>
        추가데이터:<input type="text" name="add_data">
        <br>
        <input type="submit" value="전송">
    </form>


    <!-- 
    get방식 : 
        주소표시줄 뒤에 전송할 값을 쿼리 스트링으로 변환하여 서버로 전송한다.
        전송되는 모든 정보가 노출되므로 보안적으로 문제가 없는
        정보들에 대해서만 사용하는 것이 좋다.
    POST방식 : 
        전송되는 값이 노출되지 않는다. 또한 파일, 텍스트 등 모든 값을
        전송할 수 있고, 용량에도 제한이 없다. -->

    
    <h3>POST 방식</h3>

    <!-- 
    폼값을 POST 방식으로 전송한다. 단 현재로서는 로컬에서는 세팅된 
    웹서버가 없으므로 테스트는 불가능하여 생선님 홈페이지에서 테스트를 해 보았다.
    전송되는 값은 모두 숨겨진 채로 전송되므로 URL표시줄 에서는 확인 할 수 없다. -->
    <form action="http://nakja.co.kr/test/request_form.php " method="post">
        아이디 : <input type="text" name="user_id" >
        <br>
        패스워드 : <input type="password" name="user_pwd">
        <br>
        <input type="submit" value="전송">
    </form>
    
</body>
</html>
