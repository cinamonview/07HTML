


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>셀병합</h2>
    <!-- table>tr*3>td*3 -->
     <!-- 원본 테이블 : 3행 3열로 구성 -->
    <table border="1" width="300">
        <tr>
            <td>1행 1열</td>
            <td>1행 2열</td>
            <td>1행 3열</td>
        </tr>
        <tr>
            <td>2행 1열</td>
            <td>2행 2열</td>
            <td>2행 3열</td>
        </tr>
        <tr>
            <td>3행 1열</td>
            <td>3행 2열</td>
            <td>3행 3열</td>
        </tr>
    </table>

    <h2>1행의 3개의 셀을 병합 - colspan 속성 사용</h2>
    <!-- table>tr*3>td*3 -->
     <!-- 
    colspan : 열과 열을 병합한다.
    이때 합쳐진 열의 크기만큼 td태그를 삭제해야한다. -->
    <table border="1" width="300">
        <tr>
            <!-- 
            3칸을 병합하므로 2개는 삭제처리한다.
             -->
            <td colspan="3">1행 1열</td>
            <!-- <td>1행 2열</td> -->
            <!-- <td>1행 3열</td> -->
        </tr>
        <tr>
            <td>2행 1열</td>
            <td>2행 2열</td>
            <td>2행 3열</td>
        </tr>
        <tr>
            <td>3행 1열</td>
            <td colspan="2">3행 2열</td>
            <!-- <td>3행 3열</td> -->
        </tr>
    </table>

    <h2>2행 2열과 3행 2열을 병합 - rowspan 속성 사용</h2>
    <!-- table>tr*3>td*3 -->
     <!-- 
    rowspan : 
        행과 행을 병합할때 사용한다.
        이때는 tr 사이의 td를 적절히 제거해야 한다.
     -->
    <table border="1" width="300">
        <tr>
            <td>1행 1열</td>
            <td>1행 2열</td>
            <td>1행 3열</td>
        </tr>
        <tr>
            <td>2행 1열</td>
            <td role="2">2행 2열</td>
            <td>2행 3열</td>
        </tr>
        <tr>
            <td>3행 1열</td>
            <!-- <td>3행 2열</td> -->
            <td>3행 3열</td>
        </tr>
    </table>
    
<h3>[퀴즈] 비정형 테이블 만들기</h3>

    <table border="1" width="300">
        <tr></tr>
            <td rowspan="3">1행 1열</td>
            <td colspan="2">1행 2열</td>
            <!-- <td>1행 3열</td> -->
        </tr>
        <tr>
            <td rowspan="2">2행 1열</td>
            <td>2행 2열</td>
            <!-- <td>2행 3열</td> -->
        </tr>
        <tr>
            <td>3행 1열</td>
            <!-- <td>3행 2열</td> -->
            <!-- <td>3행 3열</td> -->
        </tr>
    </table>

<h3> 퀴즈 정돱 </h3>
    <table border="1" width="300">
		<tr>
			<td rowspan="3">A</td>
			<td colspan="2">B</td>
			<!-- <td>C</td> -->
		</tr>
		<tr>
			<!-- <td>D</td> -->
			<td rowspan="2">E</td>
			<td>F</td>
		</tr>
		<tr>
			<!-- <td>G</td> -->
			<!-- <td>H</td> -->
			<td>I</td>
		</tr>
	</table>


</body>
</html>
