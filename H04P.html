<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H03P.html - 문단을 표현하는 p 태그</title>
</head>
<body>

    <!-- 
    P태그
        -Paragraph의 약자로 문단을 나눌때 사용하는 태그
        -블럭엘리먼트이고 세로형으로 배치된다(세로형배치)
        -P태그는 주로 텍스트를 쓰는 용도로 사용하므로,
        내부에 다른 블럭 엘리먼트를 배치하지 않는 것이 좋다. -->
    <h2>P태그</h2>
    <h3>자기 소개서</h3>
    <p>
        저는 유복한 가정에서 태어났습니다. <br>
        자상하신 부모님의 사랑을 받으며 자라왔습니다.
    </p>

    <!-- 
    P태그 사이에는 문단의 구분을 위하여 공백이 삽입 된다.
     -->
    <p style="text-align:right">
        <!-- 
        p태그는 블럭 엘리먼트 이므로 내부에 삽입된 텍스트를 우측으로 정렬할 수 잇다. -->
        <!-- span 태그는 텍스트의 영역만큼만 영역을 차지하므로 정렬이 큰 의미가 없다. -->
        입사동기는 열심히 하여 사장이 되고 싶습니다. <br>
        열심히 하겠습니다.
    </p>
    <!--  
    Span 태그는 인라인 엘리먼트 이므로 여유공간이 없이 텍스트를 정렬할 수 없다
    즉 우측으로 정렬되지 않는다. -->
    <span style="text-align: right;">왼쪽? 오른쪽?</span>

    <!-- 
    blockQuote 태그 : 
        문단을 표현할때 들여쓰기 (Indent) 효과가 적용된다. -->
    <h2>blockquote 태그</h2>
    <p style="text-align:center; font: size 18px;">
        어린 왕자
    </p>
    만약 네가 나를 길들인다면 <br>
    <!--
    윗 부분의 텍스트에 비해 우측으로 들여쓰기 된 상태로 출력된다. 
    들여쓰기가 적용된 상태이다. -->
    <blockquote style="border: 1px blue solid; font: size 14px;">
        내 생활은 아마 환하게 밝아질거야 <br>
        중략 ... <br>
        <mark>나를 길들여 줘...</mark>
    </blockquote>
    
</body>
</html>
