<!-- doctype선언부 : 해당문서가 HTML임을 선언-->
<!DOCTYPE html>
<!-- HTML 문서의 시작을 알리는 부분이다. -->
<html lang="en">
<!--
    head영역 : 
        해당 웹 문서의 정보( 작성자, 작성도구, 인코딩 등 )을
        웹 브라우저에게 알려주는 역할을 한다.
        -<meta>, <title> 태그는 반드시 head영역에 작성해야 한다.
        - 추가적인 태그로
            <script> : JavaScript를 작성하기 위한 태그
            <style> : CSS3(스타일시트)를 작성하기 위한 태그
-->
<head>
    <!-- 해당 HTML 문서의 캐릭터셋(문자셋)을 다국어를 지원하는
     UTF-8로 설정
    -->
    <meta charset="UTF-8">
    <!-- viewport : 모바일웹에서 최적화를 하기 위한 태그라고 알고 있으시랍니다. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 해당 문서의 타이틀로 웹 브라우저의 탭 부분에 노출된다.-->
    <title>HTML5 기본</title>
    <script>
        function myFn(param){
            alert('안녕..'+param);
        }
    </script>
    <style>
        /* 클래스 선택자 (Selector) :
            class속성으로 부여된 엘리먼트를 선택해서 스타일을 부여한다. */
        .td1{
            color:red;font-weight:bold;
        }
        #td2{
            background-color: yellow;
            font-style: italic;
        }
        #td3{
            font-size: 30px;
        }   
    </style>
</head>
<body>
    <!-- body 부분에 간단한 액션 맛보기랍니다.-->
     <h2>HTML 기본형</h2>
     <!-- 버튼에 onclick 이벤트 리스너를 이용해서 실행할
      JS 함수를 연결한다.-->
    <button onclick="myFn('Hello')">JS함수실행</button>
    
    <h2>테이블에 CSS 적용하기</h2>
    <table border="1">
        <tr>
            <td class="td1">A</td>
            <td class="td1">B</td>
        </tr>
        <tr>
            <td id="td2">C</td>
            <td id="td3">D</td>
        </tr>
    </table>

</body>
</html>
